<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lawnmower silhouette - light variant (black fill for light backgrounds) -->
  <!-- Handle -->
  <path d="M580 180 L480 340" stroke="black" stroke-width="36" stroke-linecap="round"/>
  <path d="M620 200 L520 360" stroke="black" stroke-width="36" stroke-linecap="round"/>
  <path d="M575 175 L625 205" stroke="black" stroke-width="36" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="160" y="340" rx="40" ry="40" width="400" height="180" fill="black"/>
  <!-- Engine housing -->
  <rect x="420" y="280" rx="20" ry="20" width="120" height="80" fill="black"/>
  <!-- Grass chute -->
  <rect x="140" y="380" rx="10" ry="10" width="60" height="100" fill="black"/>
  <!-- Left wheel -->
  <circle cx="240" cy="540" r="60" fill="black"/>
  <circle cx="240" cy="540" r="30" fill="white"/>
  <circle cx="240" cy="540" r="12" fill="black"/>
  <!-- Right wheel -->
  <circle cx="480" cy="540" r="60" fill="black"/>
  <circle cx="480" cy="540" r="30" fill="white"/>
  <circle cx="480" cy="540" r="12" fill="black"/>
  <!-- Blade guard line -->
  <line x1="200" y1="520" x2="520" y2="520" stroke="white" stroke-width="8"/>
  <!-- Grass blades (decoration) -->
  <path d="M120 620 Q140 580 160 620" stroke="black" stroke-width="8" fill="none"/>
  <path d="M200 640 Q220 600 240 640" stroke="black" stroke-width="8" fill="none"/>
  <path d="M320 630 Q340 590 360 630" stroke="black" stroke-width="8" fill="none"/>
  <path d="M440 640 Q460 600 480 640" stroke="black" stroke-width="8" fill="none"/>
  <path d="M560 620 Q580 580 600 620" stroke="black" stroke-width="8" fill="none"/>
</svg>
